<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Nillaxmi Sculptures is a luxury cinematic sculpture portfolio featuring stone, metal, mural, clay, and casting works." />
  <meta name="theme-color" content="#0f0f0f" />

  <title>Nillaxmi Sculptures | Luxury Sculpture Portfolio</title>
  <link rel="icon" href="data:," />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/index.css" />
</head>
<body>
  <!-- Preloader placeholder -->

  <div class="site-shell">
    <!-- 01 / Navbar -->
    <iframe class="section-frame navbar-frame" src="navbar.html" title="Nillaxmi Sculptures navigation" scrolling="no"></iframe>

    <main class="site-main" aria-label="Nillaxmi Sculptures portfolio">
      <!-- 02 / Hero -->
      <section id="hero" class="section-slot section-slot--hero" aria-label="Hero">
        <iframe class="section-frame" src="hero.html" title="Nillaxmi Sculptures hero" scrolling="no" data-auto-height></iframe>
      </section>

      <!-- 03 / About -->
      <section id="about" class="section-slot section-slot--about" aria-label="About">
        <iframe class="section-frame" src="about.html" title="About Nillaxmi Sculptures" scrolling="no" data-auto-height></iframe>
      </section>

      <!-- 04 / Categories -->
      <section id="categories" class="section-slot section-slot--categories" aria-label="Categories">
        <iframe class="section-frame" src="categories.html" title="Artwork categories" loading="lazy" scrolling="no" data-auto-height></iframe>
      </section>

      <!-- 05 / Featured Works -->
      <section id="featured-works" class="section-slot section-slot--featured" aria-label="Featured works">
        <iframe class="section-frame" src="featured-works-updated.html" title="Featured works" loading="lazy" scrolling="no" data-auto-height></iframe>
      </section>

      <!-- 06 / Process
      <section id="process" class="section-slot section-slot--process" aria-label="Process">
        <iframe class="section-frame" src="process.html" title="Sculpture process" loading="lazy" scrolling="no" data-auto-height></iframe>
      </section> -->

      <!-- 07 / Signature Projects -->
      <section id="signature-projects" class="section-slot section-slot--projects" aria-label="Signature projects">
        <iframe class="section-frame" src="signature-projects.html" title="Signature projects" loading="lazy" scrolling="no" data-auto-height></iframe>
      </section>

      <!-- 08 / Testimonials -->
      <section id="testimonials" class="section-slot section-slot--testimonials" aria-label="Testimonials">
        <iframe class="section-frame" src="testimonials.html" title="Client testimonials" loading="lazy" scrolling="no" data-auto-height></iframe>
      </section>

      <!-- 09 / Contact -->
      <section id="contact" class="section-slot section-slot--contact" aria-label="Contact">
        <iframe class="section-frame" src="contact.html" title="Contact Nillaxmi Sculptures" loading="lazy" scrolling="no" data-auto-height></iframe>
      </section>
    </main>
  </div>

  <!-- Animation script placeholder -->
  <!-- Cursor interaction placeholder -->
  <script>
    const resizeSectionFrame = (frame) => {
      let frameDocument;

      try {
        frameDocument = frame.contentDocument || frame.contentWindow?.document;
      } catch {
        return;
      }

      if (!frameDocument) return;

      const height = Math.max(
        frameDocument.body.scrollHeight,
        frameDocument.documentElement.scrollHeight
      );

      frame.style.height = `${height}px`;
    };

    const resizeAllSectionFrames = () => {
      document.querySelectorAll("[data-auto-height]").forEach(resizeSectionFrame);
    };

    document.querySelectorAll("[data-auto-height]").forEach((frame) => {
      frame.addEventListener("load", () => {
        resizeSectionFrame(frame);
        setTimeout(() => resizeSectionFrame(frame), 250);
        setTimeout(() => resizeSectionFrame(frame), 1000);
      });
    });

    window.addEventListener("resize", resizeAllSectionFrames);
  </script>
</body>
</html>
