<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="description"
    content="Nillaxmi Sculptures is a luxury cinematic sculpture portfolio featuring stone, metal, mural, clay, and casting works."
  />
  <meta name="theme-color" content="#0f0f0f" />

  <title>Nillaxmi Sculptures | Luxury Sculpture Portfolio</title>

  <link rel="icon" href="data:," />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- IMPORTANT -->
  <!-- GitHub Pages path fix -->
  <link rel="stylesheet" href="./css/index.css" />
</head>

<body>
  <div class="site-shell">

    <!-- NAVBAR -->
    <iframe
      class="section-frame navbar-frame"
      src="./html/navbar.html"
      title="Nillaxmi Sculptures Navigation"
      scrolling="no"
    ></iframe>

    <main class="site-main">

      <!-- HERO -->
      <section
        id="hero"
        class="section-slot section-slot--hero"
        aria-label="Hero Section"
      >
        <iframe
          class="section-frame"
          src="./html/hero.html"
          title="Hero"
          scrolling="no"
          data-auto-height
        ></iframe>
      </section>

      <!-- ABOUT -->
      <section
        id="about"
        class="section-slot section-slot--about"
        aria-label="About Section"
      >
        <iframe
          class="section-frame"
          src="./html/about.html"
          title="About"
          scrolling="no"
          data-auto-height
        ></iframe>
      </section>

      <!-- CATEGORIES -->
      <section
        id="categories"
        class="section-slot section-slot--categories"
        aria-label="Categories Section"
      >
        <iframe
          class="section-frame"
          src="./html/categories.html"
          title="Categories"
          loading="lazy"
          scrolling="no"
          data-auto-height
        ></iframe>
      </section>

      <!-- FEATURED WORKS -->
      <section
        id="featured-works"
        class="section-slot section-slot--featured"
        aria-label="Featured Works"
      >
        <iframe
          class="section-frame"
          src="./html/featured-works-updated.html"
          title="Featured Works"
          loading="lazy"
          scrolling="no"
          data-auto-height
        ></iframe>
      </section>

      <!-- PROCESS -->
      <section
        id="process"
        class="section-slot section-slot--process"
        aria-label="Process Section"
      >
        <iframe
          class="section-frame"
          src="./html/process.html"
          title="Process"
          loading="lazy"
          scrolling="no"
          data-auto-height
        ></iframe>
      </section>

      <!-- SIGNATURE PROJECTS -->
      <section
        id="signature-projects"
        class="section-slot section-slot--projects"
        aria-label="Signature Projects"
      >
        <iframe
          class="section-frame"
          src="./html/signature-projects.html"
          title="Signature Projects"
          loading="lazy"
          scrolling="no"
          data-auto-height
        ></iframe>
      </section>

      <!-- TESTIMONIALS -->
      <section
        id="testimonials"
        class="section-slot section-slot--testimonials"
        aria-label="Testimonials"
      >
        <iframe
          class="section-frame"
          src="./html/testimonials.html"
          title="Testimonials"
          loading="lazy"
          scrolling="no"
          data-auto-height
        ></iframe>
      </section>

      <!-- CONTACT -->
      <section
        id="contact"
        class="section-slot section-slot--contact"
        aria-label="Contact Section"
      >
        <iframe
          class="section-frame"
          src="./html/contact.html"
          title="Contact"
          loading="lazy"
          scrolling="no"
          data-auto-height
        ></iframe>
      </section>

    </main>
  </div>

  <!-- AUTO HEIGHT SCRIPT -->
  <script>
    function resizeFrame(frame) {
      try {
        const doc =
          frame.contentDocument || frame.contentWindow.document;

        if (!doc) return;

        const height = Math.max(
          doc.body.scrollHeight,
          doc.documentElement.scrollHeight
        );

        frame.style.height = height + "px";
      } catch (error) {
        console.log("Iframe resize blocked:", error);
      }
    }

    function resizeAllFrames() {
      document
        .querySelectorAll("[data-auto-height]")
        .forEach((frame) => {
          resizeFrame(frame);
        });
    }

    document
      .querySelectorAll("[data-auto-height]")
      .forEach((frame) => {
        frame.addEventListener("load", () => {
          resizeFrame(frame);

          setTimeout(() => resizeFrame(frame), 300);
          setTimeout(() => resizeFrame(frame), 1000);
          setTimeout(() => resizeFrame(frame), 2000);
        });
      });

    window.addEventListener("resize", resizeAllFrames);

    window.addEventListener("load", resizeAllFrames);
  </script>
</body>
</html>
